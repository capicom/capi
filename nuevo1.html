<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Desk - Capi Inversiones</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070b0f; --bg2: #0d1117; --bg3: #131a22; --border: #1e2d3d;
            --text: #e2e8f0; --accent: #00d4ff; --green: #00ff88; --red: #ff4466;
        }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 10px 50px rgba(0,0,0,0.6); }
        h1 { font-family: 'Syne', sans-serif; color: var(--accent); text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
        
        /* Panel de Control */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; background: var(--bg3); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: #4a6080; text-transform: uppercase; font-weight: bold; }
        input, select { background: #1a2332; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; font-family: 'JetBrains Mono'; outline: none; }
        input:focus { border-color: var(--accent); }

        /* Status Bar */
        #status-bar { font-size: 12px; text-align: center; margin-top: 20px; padding: 10px; border-radius: 5px; background: #0a1016; color: var(--accent); border: 1px solid #14202e; }
        
        /* Tabla de Datos Seleccionados */
        .data-panel { display: none; margin-top: 20px; padding: 20px; border-top: 2px solid var(--accent); background: #0f1722; border-radius: 0 0 8px 8px; }
        .grid-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .val { font-size: 1.2em; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CAPITAL OPERATOR - GGAL</h1>

    <div class="dashboard">
        <div class="input-group">
            <label>SPOT GGAL (Actualizado)</label>
            <input type="text" id="inp-s" readonly placeholder="Cargando...">
        </div>
        <div class="input-group">
            <label>Seleccionar Opción (ABRIL)</label>
            <select id="sel-k" onchange="seleccionarTicker()">
                <option value="">Conectando con el mercado...</option>
            </select>
        </div>
    </div>

    <div id="panel-info" class="data-panel">
        <div class="grid-info">
            <div><label>Símbolo</label><span id="out-sym" class="val" style="color:var(--accent)">-</span></div>
            <div><label>Strike</label><span id="out-strike" class="val">-</span></div>
            <div><label>Punta Compra</label><span id="out-bid" class="val" style="color:var(--green)">-</span></div>
            <div><label>Punta Venta</label><span id="out-ask" class="val" style="color:var(--red)">-</span></div>
        </div>
    </div>

    <div id="status-bar">Iniciando feed de datos de Google Sheets...</div>
</div>

<script>
// --- CONFIGURACIÓN DEL FEED ---
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOLUDiRTQtkZoW0a9Uesvibx3AHGKBLAtbCA65v2egQV3elg2-SNIXsk5l4E774eaPUduigSaS4C7A/pub?output=csv';
const proxy = 'https://corsproxy.io/?' + encodeURIComponent(csvUrl);

let marketData = [];

async function syncData() {
    const status = document.getElementById('status-bar');
    try {
        const response = await fetch(proxy);
        if (!response.ok) throw new Error();
        const text = await response.text();
        
        // Procesar CSV: limpiamos comillas y espacios, saltamos 2 filas de encabezado
        const rows = text.split('\n')
            .map(r => r.split(',').map(c => c.trim().replace(/"/g, '')))
            .slice(2);

        // 1. Obtener Spot GGAL
        const ggal = rows.find(r => r[0] === 'GGAL');
        if (ggal) {
            document.getElementById('inp-s').value = parseArg(ggal[7]); // Columna 'last'
        }

        // 2. Filtrar Bases (Call/Put)
        marketData = rows.filter(r => r[0] && (r[0].startsWith('GFGC') || r[0].startsWith('GFGV')))
            .map(r => ({
                sym: r[0],
                bid: parseArg(r[2]),
                ask: parseArg(r[5]),
                last: parseArg(r[7]),
                strike: parseArg(r[9])
            }));

        renderSelect();
        status.innerText = "MERCADO SINCRONIZADO: " + new Date().toLocaleTimeString();
        status.style.color = "var(--green)";
    } catch (e) {
        status.innerText = "ERROR DE CONEXIÓN - REINTENTANDO...";
        status.style.color = "var(--red)";
    }
}

function parseArg(val) {
    if (!val || val === "") return 0;
    // Convierte formato "7.155,00" a 7155.00
    return parseFloat(val.replace(/\./g, '').replace(',', '.')) || 0;
}

function renderSelect() {
    const select = document.getElementById('sel-k');
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- Seleccionar Ticker --</option>';
    
    marketData.forEach((opt, index) => {
        const item = document.createElement('option');
        item.value = index;
        item.textContent = `${opt.sym} (K: ${opt.strike})`;
        select.appendChild(item);
    });
    if(currentVal) select.value = currentVal;
}

function seleccionarTicker() {
    const idx = document.getElementById('sel-k').value;
    const panel = document.getElementById('panel-info');
    if (idx === "") {
        panel.style.display = 'none';
        return;
    }
    
    const d = marketData[idx];
    panel.style.display = 'block';
    document.getElementById('out-sym').innerText = d.sym;
    document.getElementById('out-strike').innerText = d.strike.toLocaleString('es-AR');
    document.getElementById('out-bid').innerText = d.bid.toLocaleString('es-AR');
    document.getElementById('out-ask').innerText = d.ask.toLocaleString('es-AR');
    
    // Aquí puedes disparar tus funciones de calcular() originales
}

// Iniciar y programar refresco cada 20 segundos
window.onload = syncData;
setInterval(syncData, 20000);

</script>
</body>
</html>
